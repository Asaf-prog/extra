# plugins.toml — unified manifest for this client extension package.
#
# ONE manifest for ALL client extension code: hooks, resolvers, and tools.
# It is a catalog/generation companion, NOT read by the runtime — hooks load
# from the agent YAML `hooks:` refs, resolvers and tools load by file path.
# `agentctl generate` creates this file if missing and merges new entries in
# without overwriting manual edits.
#
# SECURITY: never put secrets here. Only import refs and metadata — no tokens,
# client secrets, HMAC keys, or Authorization values.

[package]
name = "examples.plugins"
description = "Client extension package for hooks, resolvers, and tools."

[paths]
hooks = "examples.plugins.hooks"
resolvers = "examples.plugins.resolvers"
tools = "examples.plugins.tools"

[hooks]
on_engine_start = ["examples.plugins.hooks.mcp_auth:McpAuthHook.validate_auth_setup"]
on_run_start = ["examples.plugins.hooks.mcp_auth:McpAuthHook.attach_user_context"]
before_mcp_request = ["examples.plugins.hooks.mcp_auth:McpAuthHook.before_mcp_request"]
after_tool_call = ["examples.plugins.hooks.mcp_auth:McpAuthHook.record_tool_call"]
on_run_error = ["examples.plugins.hooks.mcp_auth:McpAuthHook.record_run_failure"]

[resolvers]
domestic_flights_agent = "examples.plugins.resolvers.domestic_flights_agent:Resolver"
international_flights_agent = "examples.plugins.resolvers.international_flights_agent:Resolver"
shared = "examples.plugins.resolvers.shared:SharedResolver"
super_agent = "examples.plugins.resolvers.super_agent:Resolver"

[tools]
add_to_cart = "examples.plugins.tools.add_to_cart:add_to_cart"
book_flight = "examples.plugins.tools.book_flight:book_flight"
