# DeepWiki remote MCP smoke-test configuration.
#
# Use this file to manually verify that the platform can connect to a real
# public remote MCP server using only a URL. The runtime will create a generic
# URL-based MCP client for the endpoint below during Engine.start().
#
# This is intentionally not a full product demo:
# - no stdio config
# - no command/args
# - no authentication
# - no DeepWiki-specific client code

system:
  name: "DeepWiki Repository Research Smoke Test"

defaults:
  # Deterministic settings make manual smoke-test output easier to compare.
  model:
    provider: anthropic
    name: claude-haiku-4-5
    temperature: 0.0

mcps:
  # DeepWiki exposes a public Streamable HTTP MCP endpoint. Keep this URL on
  # /mcp; do not replace it with /sse or local stdio configuration.
  deepwiki:
    url: "https://mcp.deepwiki.com/mcp"

agents:
  deepwiki_agent:
    name: "DeepWiki Repository Researcher"
    description: "Researches public GitHub repositories by using DeepWiki MCP tools before answering."
    prompts:
      system: "prompts/deepwiki/system.md"
    # This grants the agent access to tools discovered from the DeepWiki MCP
    # server. No user-written MCP client implementation is needed.
    mcps: [deepwiki]

graph:
  deepwiki_agent:

# Manual prompts to try:
# - Use DeepWiki to explain what the public GitHub repository modelcontextprotocol/python-sdk is about.
# - Use DeepWiki to inspect the wiki structure for modelcontextprotocol/python-sdk.
# - Use DeepWiki to explain the main modules in langchain-ai/langchain.
# - Use DeepWiki to find where tool calling is implemented in modelcontextprotocol/python-sdk.
